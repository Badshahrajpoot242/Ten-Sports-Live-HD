name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: npx eas build --platform android --profile preview --non-interactive --output ./ten-sports-live.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ten-sports-live-hd-apk
          path: "*.apk"
          retention-days: 30
